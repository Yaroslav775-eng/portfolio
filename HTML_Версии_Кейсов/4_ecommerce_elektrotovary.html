# E-commerce: электротовары

## Контекст
E-commerce проект с широким ассортиментом и несколькими приоритетными товарными группами. В таких аккаунтах результат сильно зависит от того, насколько правильно приоритеты бизнеса отражены в рекламной структуре.

## Задача
Сделать рекламу более управляемой и усилить ключевые товарные направления.

## Что сделали
- выделили приоритетные группы товаров
- усилили Performance Max по ключевым сегментам
- сохранили роль брендового поиска как отдельного слоя спроса
- собрали более понятную товарную логику вместо одного общего потока на весь каталог

## Метрики
- 4.3 млн показов
- 95.6 тыс. кликов
- ~€7.9k расхода
- 1 178 конверсий
- ~€51.6k value конверсий

## Итог
Получили более управляемую performance-структуру, усилили ключевые товарные группы и обозначили понятные точки дальнейшей оптимизации.

</script>
