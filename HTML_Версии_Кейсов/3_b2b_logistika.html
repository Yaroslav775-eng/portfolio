# B2B: логистика

## Контекст
B2B-проект с поисковым спросом по услугам, направлениям и брендовым запросам. Для такого аккаунта важна не только генерация обращений, но и прозрачность структуры: что именно приводит качественный спрос, а что создаёт шум.

## Задача
Усилить поток целевых обращений и сделать структуру спроса более прозрачной и управляемой.

## Что сделали
- разделили брендовый и общий спрос
- выделили приоритетные направления услуг
- усилили Search как основной канал high-intent спроса
- использовали DSA и Performance Max как дополнительный слой охвата
- собрали более понятную логику по направлениям и типам интента

## Метрики
- 1.9 млн показов
- 45 тыс. кликов
- ~€10.3k расхода
- 1 090 конверсий

## Итог
Получили более прозрачную структуру спроса, усилили приоритетные направления и создали основу для дальнейшей оптимизации.

</script>
