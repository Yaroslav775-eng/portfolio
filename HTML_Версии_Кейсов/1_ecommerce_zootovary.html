# E-commerce: зоотовары

## Контекст
E-commerce проект на рынке Украины с несколькими продуктовыми сегментами и разными типами рекламных кампаний. Задача была не просто поддерживать трафик, а сделать структуру спроса более понятной и управляемой.

## Задача
Сделать рекламную систему более управляемой и усилить ключевые направления спроса без хаотичного расширения бюджета.

## Что сделали
- разделили кампании по типам спроса и сегментам
- усилили связку Search, Performance Max и Shopping
- сместили фокус на более понятные товарные направления
- убрали лишнее смешение разных интентов внутри одной логики

## Метрики
- 1.2 млн показов
- 37 тыс. кликов
- ~€13.9k расхода
- 2 485 конверсий

## Итог
Получили более понятную и управляемую структуру аккаунта, усилили приоритетные сегменты спроса и создали базу для дальнейшего масштабирования.

</script>
